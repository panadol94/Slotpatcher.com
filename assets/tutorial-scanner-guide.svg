<svg width="760" height="440" viewBox="0 0 760 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Slotpatcher scanner tutorial preview</title>
  <desc id="desc">Premium dark preview showing provider selection, scan progress and hot result board.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="760" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090A0E"/>
      <stop offset="0.48" stop-color="#171015"/>
      <stop offset="1" stop-color="#26080B"/>
    </linearGradient>
    <linearGradient id="red" x1="128" y1="94" x2="608" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4B4B"/>
      <stop offset="0.52" stop-color="#C51F1F"/>
      <stop offset="1" stop-color="#6F0408"/>
    </linearGradient>
    <linearGradient id="gold" x1="124" y1="60" x2="636" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE6A7"/>
      <stop offset="0.48" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8A5B12"/>
    </linearGradient>
    <linearGradient id="glass" x1="112" y1="92" x2="650" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.16"/>
      <stop offset="1" stop-color="white" stop-opacity="0.035"/>
    </linearGradient>
    <filter id="softShadow" x="54" y="38" width="652" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="0" y="0" width="760" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

